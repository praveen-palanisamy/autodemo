name: publish-npm

# Publishes semver git tags only (v0.1.1, v0.2.0, …).
# The floating git tag `v0` is for the GitHub Action (`uses: …/autodemo@v0`) and
# must NOT trigger npm publish — it points at the same commit as the latest release.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish (semver tag or branch). Default: v0.1.1"
        required: false
        default: "v0.1.1"
      dry_run:
        description: "Run npm publish --dry-run instead of publishing"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write # npm Trusted Publishers (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Validate
        run: |
          bun run lint
          bun run typecheck
          bun run test:unit

      - name: Publish to npm
        run: |
          set -euo pipefail
          # setup-node writes //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN} which
          # blocks OIDC when NODE_AUTH_TOKEN is unset. Trusted Publishing needs OIDC.
          NPMRC="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          if [ -f "$NPMRC" ]; then
            sed -i '/_authToken/d' "$NPMRC"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --dry-run
          else
            npm publish
          fi
