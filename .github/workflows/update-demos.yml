name: update-demos

# Refreshes the demo artifacts that are committed to the repo (used by the
# README teaser). The product site does NOT depend on this — pages.yml
# regenerates site demos on every deploy. Runs weekly and on demand.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Generate demo artifacts (site + videos)
        run: bun run demos:update

      - name: Commit updated demo artifacts
        run: |
          git config user.name "autodemo-bot"
          git config user.email "autodemo-bot@users.noreply.github.com"
          git add -f public/demos
          git status --porcelain=v1
          git commit -m "chore(demos): refresh generated walkthrough artifacts" || exit 0
          git push
