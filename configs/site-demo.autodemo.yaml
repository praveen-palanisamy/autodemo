project:
  name: AutoDemo
  # baseUrl is supplied by CI/local scripts via --url so this stays portable.

output:
  dir: public/demos
  clean: true

browser:
  headless: true
  recordVideo: true
  viewport: { width: 1600, height: 900 }
  cursor:
    showCursor: true
    style: arrow
    pointerColor: "#66A3FF"
    clickColor: "#66A3FF"
    highlightClicks: true
    clickRadius: 24
  transitions:
    transitionMs: 700
    endPauseMs: 1200
  video:
    source: frames
    trimStartBeforeMs: 800

scenarios:
  site-landing:
    description: "AutoDemo product page: tour the landing page"
    videoStartStep: 1
    steps:
      - type: goto
        url: /
        note: "Open the AutoDemo product page"
      - type: sleep
        ms: 400
        note: "Let layout and fonts settle before scrolling"
      - type: scrollIntoView
        selector: "[data-testid=section-how]"
        behavior: auto
        note: "How it works: describe → run → ship"
      - type: scrollIntoView
        selector: "[data-testid=section-features]"
        behavior: auto
        note: "Built for humans and AI agents"
      - type: scrollIntoView
        selector: "[data-testid=section-code]"
        behavior: auto
        note: "Scenarios are code, versioned in git"
      - type: scrollIntoView
        selector: "[data-testid=section-compare]"
        behavior: auto
        note: "Why not a demo SaaS or screen recorder?"
      - type: scrollIntoView
        selector: "[data-testid=section-start]"
        behavior: auto
        note: "Get started in 60 seconds"
      - type: scrollTo
        y: 0
        behavior: auto
        note: "Back to the top"
      - type: sleep
        ms: 800
        note: "Pause for the video tail"

  site-walkthrough:
    description: "Step through an interactive walkthrough that AutoDemo generated"
    steps:
      - type: goto
        url: /demos/site-landing/latest/index.html
        note: "Open the generated interactive walkthrough"
      - type: waitForSelector
        selector: "#next"
        note: "Walkthrough loads (static HTML + run.json)"
      - type: click
        selector: "#next"
        note: "Advance a step"
      - type: click
        selector: "#next"
        note: "Advance another step"
      - type: sleep
        ms: 600
        note: "Pause for the video tail"
